<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ✅ ADD THIS FIRST — SPA refresh fix -->
    <script>
      (function (l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').reduce(function (acc, s) {
            var pair = s.split('=');
            acc[pair[0]] = pair.slice(1).join('=').replace(/~and~/g, '&');
            return acc;
          }, {});
          if (decoded.p) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) +
              (decoded.p || '') +
              (decoded.q ? '?' + decoded.q : '') +
              l.hash
            );
          }
        }
      })(window.location);
    </script>
